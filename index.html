// --- REMOVE WHITE BACKGROUND ---
function removeWhiteBg(img) {
  const off = document.createElement('canvas');
  off.width = img.width;
  off.height = img.height;
  const offCtx = off.getContext('2d');
  offCtx.drawImage(img, 0, 0);
  const data = offCtx.getImageData(0, 0, off.width, off.height);
  const d = data.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    // if pixel is near-white, make it transparent
    if (r > 220 && g > 220 && b > 220) {
      d[i+3] = 0;
    }
  }
  offCtx.putImageData(data, 0, 0);
  return off;
}

// --- BACKGROUND ---
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#e0f7ff');    // Soft sky blue at the top
  grad.addColorStop(0.6, '#f4fcff');  // Very light tint in the middle
  grad.addColorStop(1, '#ffffff');    // Pure white at the bottom
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    ctx.arc((i*137.5)%canvas.width, (i*89.3)%canvas.height, 0.8+(i%3)*0.6, 0, Math.PI*2);
    // Soft, semi-transparent blue particles instead of harsh white stars
    ctx.fillStyle = `rgba(135, 206, 250, ${0.25+(i%5)*0.12})`;
    ctx.fill();
  }
}


// --- CATS ---
function createCat() {
  const right = Math.random() > 0.8;
  return {
    x: right ? -50 : canvas.width + 50,
    y: 80 + Math.random() * (canvas.height - 140),
    speed: 1.0 + Math.random() * 1.5,
    facingRight: right,
    size: 60 + Math.random() * 40,
    meowing: 0
  };
}

const cats = Array.from({length: 10}, createCat);
cats.forEach(c => { c.y = 60 + Math.random()*(canvas.height-140); });

let cleanCat = null;
catImg.onload = () => { cleanCat = removeWhiteBg(catImg); };

function drawCat(c) {
  if (!cleanCat) return;
  ctx.save();
  ctx.translate(c.x, c.y);
  if (!c.facingRight) ctx.scale(-1, 1);
  ctx.drawImage(cleanCat, -c.size/2, -c.size/2, c.size, c.size);

  if (c.meowing > 0) {
    ctx.save();
    if (!c.facingRight) ctx.scale(-1, 1);
    ctx.font = 'bold 14px Georgia';
    ctx.fillStyle = '#FFD700';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff80d5';
    ctx.shadowBlur = 8;
    ctx.fillText('Meow! 🐱', 0, -c.size/2 - 10);
    ctx.restore();
  }
  ctx.restore();
}

function updateCat(c) {
  c.x += c.facingRight ? c.speed : -c.speed;
  if (c.meowing > 0) c.meowing--;
  if (c.facingRight && c.x > canvas.width + 100) {
    c.x = -80; c.y = 60 + Math.random()*(canvas.height-140);
  }
  if (!c.facingRight && c.x < -100) {
    c.x = canvas.width + 80; c.y = 60 + Math.random()*(canvas.height-140);
  }
}

// Pre-load the audio file so it plays instantly when called
const meowAudio = new Audio('./meow.mp3');

function meow() {
  meowAudio.currentTime = 0; // Rewind to the start (allows rapid spam-clicking)
  meowAudio.play().catch(error => console.log("Audio playback failed:", error));
}


// --- CLICK TO MEOW ---
canvas.addEventListener('click', e => {
  cats.forEach(c => {
    const dx = e.clientX - c.x;
    const dy = e.clientY - c.y;
    if (Math.sqrt(dx*dx + dy*dy) < c.size/2) {
      meow();
      c.meowing = 70;
    }
  });
});

// --- BIRTHDAY TEXT ---
function drawText() {
  const cx = canvas.width/2, cy = canvas.height/2;
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ff80d5'; ctx.shadowBlur = 22;
  const tg = ctx.createLinearGradient(cx-160, 0, cx+160, 0);
  tg.addColorStop(0, '#FFD700');
  tg.addColorStop(0.5, '#EF9ACD');
  tg.addColorStop(1, '#FFD700');
  ctx.font = `bold ${Math.max(28, canvas.width*0.055)}px Georgia, serif`;
  ctx.fillStyle = tg;
  ctx.fillText('Happy Birthday Debaprabha!', cx, cy - 16);
  ctx.shadowBlur = 10;
  ctx.font = `${Math.max(14, canvas.width*0.025)}px Georgia, serif`;
  ctx.fillStyle = 'rgba(60,65,20,0.9)';
  ctx.fillText('Click the cats and enjoy -^.^-', cx, cy + 28);
  ctx.restore();
}

// --- ANIMATION LOOP ---
function animate() {
  drawBackground();
  cats.forEach(c => { updateCat(c); drawCat(c); });
  drawText();
  requestAnimationFrame(animate);
}
animate();
</script>
